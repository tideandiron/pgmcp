#
# cargo-deny configuration.
# Run: cargo deny check
# CI: enforced in the deny job of ci.yml.

[graph]
targets = []

[advisories]
# Deny all crates with known security vulnerabilities.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
version = 2
# Allow only permissive, well-understood licenses.
allow = [
    "Apache-2.0",
    # Apache-2.0 WITH LLVM-exception is used by ar_archive_writer (via sqlparser → stacker → psm).
    # The LLVM exception is a permissive carve-out that *broadens* the license, not restricts it.
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    # Unicode-3.0 is used by unicode-ident (via proc-macro2, pervasive across the ecosystem).
    # It is an OSI-approved permissive license, functionally equivalent to MIT for our use case.
    "Unicode-3.0",
]
# confidence-threshold: how confident cargo-deny must be before
# treating a license as "identified". 0.8 is the default.
confidence-threshold = 0.8

[bans]

# Crates that are explicitly prohibited in pgmcp's own code.
#
# Note: these bans apply to the full dependency graph, including transitive deps.
# Any transitive dep that pulls in a banned crate must have a corresponding
# skip entry below. The intent is to prevent pgmcp source code from adding
# direct dependencies on these crates.
deny = [
    # eyre erases error types for the same reason as anyhow
    { crate = "eyre", reason = "McpError is the error surface; type erasure is prohibited" },
]

skip = []

# Multiple versions of core serialization and async runtime crates can cause
# subtle runtime bugs (e.g., type ID mismatches) and inflated binary size.
# Declare the allowed versions to detect accidental version splits.
#
# Note: this section uses the `skip-tree` feature to allow the specific
# version pulled by pgmcp's direct dependencies. If a new version appears
# in the tree (indicating two versions are in use), cargo-deny will flag it.

[sources]
# Only allow crates from crates.io. Git sources and path overrides must be
# explicitly declared here during development; all must be removed before release.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
