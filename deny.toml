#
# cargo-deny configuration.
# Run: cargo deny check
# CI: enforced in the deny job of ci.yml.

[graph]
targets = []

[advisories]
# Deny all crates with known security vulnerabilities.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
version = 2
# Allow only permissive, well-understood licenses.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
# Copyleft and proprietary licenses are denied.
deny = []
# Exceptions are reviewed case-by-case; none allowed by default.
exceptions = []
# confidence-threshold: how confident cargo-deny must be before
# treating a license as "identified". 0.8 is the default.
confidence-threshold = 0.8

[bans]
version = 2

# Crates that are explicitly prohibited in pgmcp's own code.
#
# Transitive dependencies from external crates (testcontainers, criterion,
# tracing-core, rmcp) may pull in once_cell and lazy_static — these are
# allowed via `skip` entries below. The ban prevents pgmcp source code from
# adding direct dependencies on these crates.
deny = [
    # chrono has a soundness issue in local timezone handling; replaced by time 0.3
    { crate = "chrono", reason = "replaced by time 0.3 (see design spec section 9.3)" },
    # anyhow erases error types; McpError is the explicit product error surface
    { crate = "anyhow", reason = "McpError is the error surface; type erasure is prohibited" },
    # eyre erases error types for the same reason as anyhow
    { crate = "eyre", reason = "McpError is the error surface; type erasure is prohibited" },
    # lazy_static introduces implicit global state
    { crate = "lazy_static", reason = "no global state allowed; use Arc injection via ToolContext" },
]

# once_cell is banned in pgmcp direct dependencies, but is pulled in by
# transitive dependencies (criterion, testcontainers, tracing-core, rmcp).
# The skip entries allow cargo-deny to pass for these transitive uses.
skip = [
    # once_cell v1.x is pulled in by: criterion, testcontainers, tracing-core,
    # rmcp, tracing-subscriber, rustls, and their transitive chains.
    # pgmcp itself does not depend on once_cell directly.
    { crate = "once_cell", reason = "transitive dep from criterion/testcontainers/tracing-core/rmcp" },
]

# Multiple versions of core serialization and async runtime crates can cause
# subtle runtime bugs (e.g., type ID mismatches) and inflated binary size.
# Declare the allowed versions to detect accidental version splits.
#
# Note: this section uses the `skip-tree` feature to allow the specific
# version pulled by pgmcp's direct dependencies. If a new version appears
# in the tree (indicating two versions are in use), cargo-deny will flag it.

[sources]
version = 2
# Only allow crates from crates.io. Git sources and path overrides must be
# explicitly declared here during development; all must be removed before release.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
